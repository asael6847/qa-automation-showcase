name: E2E

on:
  push:
    branches: [main]
  pull_request:

jobs:
  e2e:
    name: Playwright E2E (Screenplay)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter tests exec playwright install --with-deps chromium

      - name: Run E2E suite
        # No enmascaramos fallos: si hay tests rojos, el job falla...
        run: pnpm --filter tests test

      - name: Upload Playwright HTML report
        # ...pero el reporte se sube SIEMPRE, también cuando la suite falla,
        # para poder diagnosticar desde los artifacts.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/playwright-report/
          retention-days: 14
