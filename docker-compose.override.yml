# Override local. Ajustes de puertos para no chocar con otros proyectos
# (laboratorio) que ya corren en esta máquina y no se pueden mover:
#
# 1) Postgres: el puerto host 5433 lo ocupa otro proyecto -> lo remapeamos a 5434.
#
# 2) El backend corre en el HOST (no en Docker) para poder abrir el navegador
#    VISIBLE del modo "con supervisión" (un contenedor no tiene pantalla). Como
#    el 8000 y el 8001 ya los ocupan lab_backend/qa_backend, el backend del host
#    de este proyecto va en el 8020. Por eso:
#      - el backend de Docker se remapea a 8010 (queda inofensivo si se levanta),
#      - el dashboard (navegador vía NEXT_PUBLIC_API_URL, y SSR vía
#        API_INTERNAL_URL) apunta al backend del host en el 8020.
services:
  postgres:
    ports: !override
      - "5434:5432"

  backend:
    ports: !override
      - "8010:8000"

  dashboard:
    build:
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8020
    environment:
      API_INTERNAL_URL: http://host.docker.internal:8020
